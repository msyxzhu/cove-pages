<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fogsight 雾象 - 动画视频目录</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Noto+Serif+SC:wght@700;900&family=Ma+Shan+Zheng&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a1a;
    color: #e8eaf6;
    font-family: 'Noto Sans SC', sans-serif;
  }

  /* Header */
  .header {
    padding: 60px 40px 40px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, #4fc3f7, #ff6b9d, #ffd54f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 8px;
  }
  .header p {
    margin-top: 12px;
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 4px;
  }
  .header .stats {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 40px;
  }
  .header .stat {
    text-align: center;
  }
  .header .stat-num {
    font-size: 36px;
    font-weight: 900;
    color: #4fc3f7;
  }
  .header .stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 24px;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(79,195,247,0.3);
    box-shadow: 0 8px 40px rgba(79,195,247,0.1);
  }

  .card-preview {
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
    overflow: hidden;
  }
  .card-preview::after {
    content: '▶';
    position: absolute;
    right: 16px;
    bottom: 12px;
    font-size: 24px;
    color: rgba(255,255,255,0.3);
    transition: color 0.2s;
  }
  .card:hover .card-preview::after {
    color: #4fc3f7;
  }

  .card-body {
    padding: 20px 24px 24px;
  }
  .card-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .tag-tech { background: rgba(79,195,247,0.15); color: #4fc3f7; }
  .tag-topic { background: rgba(255,107,157,0.15); color: #ff6b9d; }
  .tag-style { background: rgba(255,213,79,0.15); color: #ffd54f; }
  .tag-audio { background: rgba(105,240,174,0.15); color: #69f0ae; }

  .card-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    line-height: 1.6;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: rgba(255,255,255,0.25);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px;
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .footer a { color: #4fc3f7; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; padding: 20px; }
    .header h1 { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Fogsight 雾象</h1>
  <p>AI 动画引擎 · HTML → 视频</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">动画作品</div>
    </div>
    <div class="stat">
      <div class="stat-num">2</div>

    </div>
    <div class="stat">
      <div class="stat-num">4</div>

    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

  Powered by HTML + CSS + JS · GSAP · Lottie · anime.js · Edge TTS<br>

</div>

// Render

demos.forEach(d => {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = d.url;
  card.target = '_blank';
  
  const tagsHTML = d.tags.map(t => 
    `<span class="tag tag-${t.type}">${t.text}</span>`
  ).join('');
  
  card.innerHTML = `
    <div class="card-preview" style="background:${d.bg};">
      <span>${d.emoji}</span>
    </div>
    <div class="card-body">
      <div class="card-tags">${tagsHTML}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-meta">
        <span>${d.ratio}</span>
        <span>${d.date}</span>

    </div>

document.getElementById('totalCount').textContent = demos.length;

</body>
</html>
