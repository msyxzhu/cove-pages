<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cove 测试页面 🌊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .emoji { font-size: 4em; margin-bottom: 10px; }
        h1 { font-size: 2em; margin-bottom: 16px; }
        p { font-size: 1.1em; line-height: 1.8; opacity: 0.9; }
        ul { list-style: none; margin: 16px 0; }
        ul li { padding: 6px 0; font-size: 1.05em; }
        .divider { border-top: 1px solid rgba(255,255,255,0.2); margin: 24px 0; }
        .footer { opacity: 0.6; font-size: 0.85em; font-style: italic; }
        .pulse { animation: pulse 2s infinite; display: inline-block; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji"><span class="pulse">🌊</span></div>
        <h1>Hey 轩！</h1>
        <p>如果你能看到这个页面，说明 iframe 嵌入成功了！</p>
        <ul>
            <li>✅ CSS 渐变背景</li>
            <li>✅ 毛玻璃效果</li>
            <li>✅ 动画效果</li>
            <li>✅ 响应式布局</li>
        </ul>
        <div class="divider"></div>
        <p class="footer">Generated by Cove 🌊 · 2026-03-31</p>
    </div>
</body>
</html>
