<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>科普视频 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 40%, #2d1b69 100%);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  color: white;
}

/* 星空粒子背景 */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 3s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.9; }
}

/* 标题区域 */
.title-section {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  z-index: 10;
  opacity: 0;
  animation: fadeSlideIn 1.2s ease-out 0.5s forwards;
}

.title-section h1 {
  font-size: 80px;
  font-weight: 900;
  background: linear-gradient(135deg, #00d2ff, #7b2ffc, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.3;
  letter-spacing: 4px;
}

.title-section .subtitle {
  font-size: 36px;
  color: rgba(255,255,255,0.7);
  margin-top: 20px;
  letter-spacing: 8px;
}

/* 地球动画 */
.earth-container {
  position: absolute;
  top: 580px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  opacity: 0;
  animation: fadeIn 1.5s ease-out 1.5s forwards;
}

.earth {
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #4fc3f7, #1565c0 40%, #0d47a1 70%, #01579b);
  box-shadow:
    0 0 80px rgba(79, 195, 247, 0.4),
    inset -30px -30px 60px rgba(0,0,0,0.4);
  animation: rotate 20s linear infinite, float 4s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

/* 大陆简化 */
.earth::before {
  content: '';
  position: absolute;
  top: 80px;
  left: 100px;
  width: 120px;
  height: 100px;
  background: #4caf50;
  border-radius: 40% 60% 50% 40%;
  opacity: 0.7;
  animation: landDrift 20s linear infinite;
}
.earth::after {
  content: '';
  position: absolute;
  top: 200px;
  left: 200px;
  width: 80px;
  height: 60px;
  background: #66bb6a;
  border-radius: 50% 30% 60% 40%;
  opacity: 0.6;
  animation: landDrift 20s linear infinite;
}

@keyframes landDrift {
  from { transform: translateX(0); }
  to { transform: translateX(-400px); }
}

@keyframes float {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-20px); }
}

/* 轨道环 */
.orbit {
  position: absolute;
  top: 530px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  z-index: 4;
  opacity: 0;
  animation: fadeIn 1s ease-out 2s forwards;
}

.orbit-dot {
  position: absolute;
  width: 20px;
  height: 20px;
  background: #ff6b9d;
  border-radius: 50%;
  box-shadow: 0 0 20px #ff6b9d;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  animation: orbitMove 6s linear infinite;
}

@keyframes orbitMove {
  from { transform: translateX(-50%) rotate(0deg) translateY(300px) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg) translateY(300px) rotate(-360deg); }
}

/* 数据卡片区 */
.facts {
  position: absolute;
  bottom: 250px;
  width: 100%;
  padding: 0 60px;
  z-index: 10;
}

.fact-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 40px;
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(40px);
}

.fact-card:nth-child(1) { animation: cardIn 0.8s ease-out 2.5s forwards; }
.fact-card:nth-child(2) { animation: cardIn 0.8s ease-out 3.2s forwards; }
.fact-card:nth-child(3) { animation: cardIn 0.8s ease-out 3.9s forwards; }

.fact-card .number {
  font-size: 56px;
  font-weight: 900;
  background: linear-gradient(90deg, #00d2ff, #7b2ffc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.fact-card .label {
  font-size: 30px;
  color: rgba(255,255,255,0.8);
  margin-top: 4px;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-40px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 底部来源 */
.source {
  position: absolute;
  bottom: 100px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 4px;
  z-index: 10;
  opacity: 0;
  animation: fadeIn 1s ease-out 4.5s forwards;
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="title-section">
  <h1>地球的<br>秘密档案</h1>
  <div class="subtitle">· 你不知道的冷知识 ·</div>
</div>

<div class="earth-container">
  <div class="earth"></div>
</div>

<div class="orbit">
  <div class="orbit-dot"></div>
</div>

<div class="facts">
  <div class="fact-card">
    <div class="number">4,600,000,000</div>
    <div class="label">地球的年龄（年）</div>
  </div>
  <div class="fact-card">
    <div class="number">71%</div>
    <div class="label">地球表面被水覆盖</div>
  </div>
  <div class="fact-card">
    <div class="number">1,670 km/h</div>
    <div class="label">赤道自转速度</div>
  </div>
</div>

<div class="source">数据来源：NASA · 2024</div>

<script>
// 生成星空
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
  star.style.animationDelay = Math.random() * 3 + 's';
  star.style.animationDuration = (Math.random() * 3 + 2) + 's';
  starsContainer.appendChild(star);
}
</script>
</body>
</html>
