<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客厅/健身区 3D Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
canvas{display:block}
#info{position:fixed;top:12px;left:12px;color:#fff;font-size:13px;opacity:.6;pointer-events:none;z-index:10}
#controls{position:fixed;top:12px;right:12px;z-index:100;display:flex;flex-direction:column;gap:8px;min-width:180px}
.ctrl-btn{padding:8px 14px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(30,30,30,.65);backdrop-filter:blur(16px);color:#e8e0d4;font-size:13px;cursor:pointer;transition:all .2s;text-align:left}
.ctrl-btn:hover{background:rgba(60,55,48,.7);border-color:rgba(255,255,255,.3)}
.ctrl-btn.active{background:rgba(196,147,90,.35);border-color:rgba(196,147,90,.5)}
#popup{position:fixed;display:none;padding:16px 20px;border-radius:14px;background:rgba(30,28,24,.82);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);color:#e8e0d4;font-size:14px;line-height:1.7;z-index:200;max-width:280px;pointer-events:auto;box-shadow:0 8px 32px rgba(0,0,0,.4)}
#popup h3{margin-bottom:6px;font-size:15px}
#popup .close{position:absolute;top:8px;right:12px;cursor:pointer;opacity:.5;font-size:16px}
#popup .close:hover{opacity:1}
#labelContainer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
.label-3d{position:absolute;padding:4px 10px;border-radius:6px;background:rgba(30,28,24,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:#e8e0d4;font-size:11px;white-space:nowrap;pointer-events:auto;cursor:pointer;transition:all .15s;transform:translate(-50%,-50%)}
.label-3d:hover{background:rgba(196,147,90,.4);border-color:rgba(196,147,90,.5)}
</style>
</head>
<body>
<div id="info">🏠 客厅/健身区 · 拖拽旋转 · 滚轮缩放 · 点击查看收纳</div>
<div id="controls">
  <button class="ctrl-btn" onclick="resetView()">🔄 重置视角</button>
  <button class="ctrl-btn active" id="btnLabels" onclick="toggleLabels()">🏷️ 收纳标签</button>
  <button class="ctrl-btn" id="btnZones" onclick="toggleZones()">📐 功能区标注</button>
  <button class="ctrl-btn" id="btnScreen" onclick="toggleScreen()">🎬 投影幕布</button>
</div>
<div id="popup"><span class="close" onclick="hidePopup()">✕</span><h3 id="popupTitle"></h3><div id="popupBody"></div></div>
<div id="labelContainer"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

// Scale: 1 unit = 1mm, we'll work in meters internally
const S = 0.001; // mm to scene units (meters)
const W = 3672, D = 3098, H = 2400, CAB_D = 400, CORR_W = 1242;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#2a2520');
scene.fog = new THREE.FogExp2('#2a2520', 0.15);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 50);
const defaultCamPos = new THREE.Vector3(5.5, 2.8, 4.5);
const defaultTarget = new THREE.Vector3(W*S/2, H*S*0.4, -D*S/2);
camera.position.copy(defaultCamPos);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(defaultTarget);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// Materials
const mat = {
  floor: new THREE.MeshStandardMaterial({color:'#DCC9A8', roughness:0.7, metalness:0}),
  ceiling: new THREE.MeshStandardMaterial({color:'#F5F0E8', roughness:0.9}),
  wall: new THREE.MeshStandardMaterial({color:'#F2EDE4', roughness:0.85}),
  cabinet: new THREE.MeshStandardMaterial({color:'#F5F0E8', roughness:0.5, metalness:0.02}),
  oak: new THREE.MeshStandardMaterial({color:'#C4935A', roughness:0.6}),
  terracotta: new THREE.MeshStandardMaterial({color:'#C47A5A', roughness:0.85}),
  windowFrame: new THREE.MeshStandardMaterial({color:'#222222', roughness:0.3, metalness:0.5}),
  glass: new THREE.MeshPhysicalMaterial({color:'#aaddff', transparent:true, opacity:0.15, roughness:0, metalness:0.1, transmission:0.8}),
  sofa: new THREE.MeshStandardMaterial({color:'#EDE6D8', roughness:0.85}),
  rug: new THREE.MeshStandardMaterial({color:'#D4C8B0', roughness:0.95}),
  door: new THREE.MeshStandardMaterial({color:'#3A4A42', roughness:0.4, metalness:0.1}),
  fridge: new THREE.MeshStandardMaterial({color:'#E8C8B8', roughness:0.3, metalness:0.05}),
  black: new THREE.MeshStandardMaterial({color:'#1a1a1a', roughness:0.3, metalness:0.3}),
  screen: new THREE.MeshStandardMaterial({color:'#f8f8f8', roughness:0.95, side:THREE.DoubleSide}),
  led: new THREE.MeshBasicMaterial({color:'#FFE4B5'}),
  globeGlass: new THREE.MeshPhysicalMaterial({color:'#FFF5E0', transparent:true, opacity:0.6, roughness:0.2, emissive:'#FFE4B5', emissiveIntensity:0.8}),
  copper: new THREE.MeshStandardMaterial({color:'#B87333', roughness:0.3, metalness:0.8}),
};

function box(w,h,d,m,x,y,z){
  const g=new THREE.Mesh(new THREE.BoxGeometry(w*S,h*S,d*S),m);
  g.position.set(x*S,y*S,z*S);g.castShadow=true;g.receiveShadow=true;return g;
}

// Floor
const floor = box(W+CORR_W+200, 20, D+200, mat.floor, (W+CORR_W)/2, -10, -D/2);
floor.receiveShadow = true;
scene.add(floor);

// Ceiling
scene.add(box(W+CORR_W, 40, D, mat.ceiling, (W+CORR_W)/2, H+20, -D/2));

// LED strips in ceiling edges
function ledStrip(x,y,z,w,d){const l=box(w,8,d,mat.led,x,y,z);scene.add(l);}
ledStrip(W/2, H-4, -50, W-200, 30);
ledStrip(W/2, H-4, -(D-50), W-200, 30);
ledStrip(50, H-4, -D/2, 30, D-200);
ledStrip(W-50, H-4, -D/2, 30, D-200);

// === SOUTH WALL (Window Wall, z=0) ===
// Window sill
scene.add(box(W, 80, 100, mat.wall, W/2, 40, 50));
// Window frames - 3 panels
for(let i=0;i<3;i++){
  const px = 300 + i*(W-600)/2.5;
  // vertical frames
  scene.add(box(40, 2310, 40, mat.windowFrame, px, 80+1155, 0));
  // glass
  scene.add(box((W-600)/3-40, 2310, 10, mat.glass, px+(W-600)/6, 80+1155, 0));
}
// top frame
scene.add(box(W, 40, 40, mat.windowFrame, W/2, 80+2310+20, 0));
// bottom frame
scene.add(box(W, 40, 40, mat.windowFrame, W/2, 80-20, 0));
// left/right frames
scene.add(box(40, 2350, 40, mat.windowFrame, 100, 80+1155, 0));
scene.add(box(40, 2350, 40, mat.windowFrame, W-100, 80+1155, 0));
// Wall above window
scene.add(box(W, H-2390, 100, mat.wall, W/2, 2390+(H-2390)/2, 0));

// Curtain box recess
scene.add(box(W-100, 80, 150, mat.ceiling, W/2, H-40, 40));

// Projector screen (toggleable)
const screenGroup = new THREE.Group();
const screenMesh = box(2400, 1500, 10, mat.screen, W/2, H-750-100, -100);
screenGroup.add(screenMesh);
// Screen housing
screenGroup.add(box(2500, 80, 80, mat.cabinet, W/2, H-40, -100));
screenGroup.visible = false;
scene.add(screenGroup);

// === NORTH WALL (Cabinet Wall, z=-D) ===
// Back wall
scene.add(box(W, H, 60, mat.wall, W/2, H/2, -D-30));

// Cabinet wall - divided into sections
// Left cabinets (white closed)
for(let i=0;i<3;i++){
  const cx = 200 + i*450;
  const cab = box(420, H-20, CAB_D, mat.cabinet, cx, H/2, -D+CAB_D/2);
  cab.userData = {clickable:true, title:'📦 白色封闭柜', body:'衣物 / 被褥 / 换季物品<br>Clothes, bedding, seasonal items'};
  scene.add(cab);
  // door line
  scene.add(box(4, H-60, CAB_D+2, new THREE.MeshBasicMaterial({color:'#d8d0c4'}), cx, H/2, -D+CAB_D/2+1));
}

// Center: open bookshelves with oak
const shelfX = 1600;
for(let row=0;row<5;row++){
  const sy = 100 + row * (H-200)/5;
  // shelf board
  scene.add(box(800, 20, CAB_D, mat.oak, shelfX, sy, -D+CAB_D/2));
  // back panel
  scene.add(box(800, (H-200)/5-20, 20, mat.oak, shelfX, sy+(H-200)/10, -D+20));
}
// top/bottom/sides
scene.add(box(20, H, CAB_D, mat.oak, shelfX-410, H/2, -D+CAB_D/2));
scene.add(box(20, H, CAB_D, mat.oak, shelfX+410, H/2, -D+CAB_D/2));
scene.add(box(800, 20, CAB_D, mat.oak, shelfX, H-10, -D+CAB_D/2));
// LED in shelves
for(let r=0;r<4;r++){
  const ly = 200 + r*(H-200)/5 + (H-200)/5 - 30;
  ledStrip(shelfX, ly, -D+CAB_D-20, 760, 10);
}
// clickable zone
const shelfZone = box(800, H, CAB_D, new THREE.MeshBasicMaterial({transparent:true,opacity:0}));
shelfZone.position.set(shelfX*S, H/2*S, (-D+CAB_D/2)*S);
shelfZone.userData = {clickable:true, title:'📚 开放书架', body:'书籍 + 装饰品 + 常用物品<br>Books, decor, daily items<br>内置LED灯带照明'};
scene.add(shelfZone);

// Right cabinets
for(let i=0;i<2;i++){
  const cx = 2200 + i*450;
  const cab = box(420, H-20, CAB_D, mat.cabinet, cx, H/2, -D+CAB_D/2);
  cab.userData = {clickable:true, title:'📦 白色封闭柜', body:'衣物 / 被褥 / 换季物品'};
  scene.add(cab);
}

// Arched niche section (right)
const nicheX = 3050;
// terracotta surround
scene.add(box(500, H, CAB_D+60, mat.terracotta, nicheX, H/2, -D+CAB_D/2));
// niche opening (arch approximation) - cut into terracotta with cream interior
const nicheW = 380, nicheH = 1800;
scene.add(box(nicheW, nicheH, CAB_D-40, mat.cabinet, nicheX, nicheH/2+100, -D+CAB_D/2));
// arch top (half cylinder approx with box)
scene.add(box(nicheW, 60, CAB_D-40, mat.cabinet, nicheX, nicheH+130, -D+CAB_D/2));
// 3-drawer oak cabinet inside niche
for(let d=0;d<3;d++){
  const dy = 150 + d*280;
  scene.add(box(340, 250, 350, mat.oak, nicheX, dy, -D+CAB_D/2));
  scene.add(box(300, 8, 352, new THREE.MeshBasicMaterial({color:'#a07840'}), nicheX, dy+40, -D+CAB_D/2));
}
const nicheZone = box(500, H, CAB_D+60, new THREE.MeshBasicMaterial({transparent:true,opacity:0}));
nicheZone.position.set(nicheX*S, H/2*S, (-D+CAB_D/2)*S);
nicheZone.userData = {clickable:true, title:'🏺 拱形壁龛', body:'装饰展示区 · 3层橡木抽屉柜<br>Decorative display + oak drawers'};
scene.add(nicheZone);

// More white cabinets far right
const cab_r = box(420, H-20, CAB_D, mat.cabinet, 3450, H/2, -D+CAB_D/2);
cab_r.userData = {clickable:true, title:'📦 白色封闭柜', body:'衣物 / 被褥 / 换季物品'};
scene.add(cab_r);

// === EAST WALL (x=W+CORR_W, entry side) ===
scene.add(box(60, H, D, mat.wall, W+CORR_W+30, H/2, -D/2));
// Corridor wall partial (from x=W to x=W+CORR_W at z=0 side)
scene.add(box(CORR_W, H, 60, mat.wall, W+CORR_W/2, H/2, 30));

// Double entrance door
const doorX = W + CORR_W/2;
scene.add(box(1000, 2100, 60, mat.door, doorX, 1050, -D+30));
// door handles
scene.add(box(20, 120, 30, mat.copper, doorX-100, 1050, -D+65));
scene.add(box(20, 120, 30, mat.copper, doorX+100, 1050, -D+65));

// Fridge
const fridgeX = W + CORR_W - 350;
const fridge = box(600, 1900, 650, mat.fridge, fridgeX, 950, -D+500);
fridge.userData = {clickable:true, title:'🧊 冰箱', body:'双开门冰箱<br>Double-door refrigerator'};
scene.add(fridge);
// fridge line
scene.add(box(4, 1850, 652, new THREE.MeshBasicMaterial({color:'#d4b0a0'}), fridgeX, 950, -D+500));

// Terracotta section near fridge on east wall
scene.add(box(60, H, 800, mat.terracotta, W+CORR_W+30, H/2, -D+400));

// Inner wall between main room and corridor (partial)
scene.add(box(60, H, D-800, mat.wall, W-30, H/2, -(D-800)/2-800));

// === WEST WALL (x=0) ===
scene.add(box(60, H, D, mat.wall, -30, H/2, -D/2));
// Cabinets on west wall
for(let i=0;i<2;i++){
  const cz = -(D-400) + i*500;
  scene.add(box(CAB_D, H-20, 460, mat.cabinet, CAB_D/2, H/2, cz));
}
// Open oak shelves on west wall
for(let r=0;r<4;r++){
  scene.add(box(CAB_D, 20, 460, mat.oak, CAB_D/2, 400+r*500, -800));
}

// === BALCONY (beyond south wall, z>0) ===
// Balcony floor
scene.add(box(W, 20, 1200, mat.floor, W/2, -10, 600));
// Balcony railing (glass)
scene.add(box(W, 1100, 20, mat.glass, W/2, 550, 1200));
scene.add(box(W, 40, 20, mat.windowFrame, W/2, 1100, 1200));
// Washer + Dryer stack
const washerX = 500;
const washer = box(600, 600, 550, mat.black, washerX, 300, 600);
washer.userData = {clickable:true, title:'🫧 洗衣机+烘干机', body:'叠放式洗烘一体<br>Stacked washer + dryer'};
scene.add(washer);
scene.add(box(600, 600, 550, mat.black, washerX, 900, 600));

// === FURNITURE ===

// Curved cloud sofa (弧形沙发) - approximation
const sofaGroup = new THREE.Group();
const sofaCurve = new THREE.Shape();
sofaCurve.moveTo(-1.1, 0);
sofaCurve.quadraticCurveTo(-1.1, -0.45, 0, -0.5);
sofaCurve.quadraticCurveTo(1.1, -0.45, 1.1, 0);
sofaCurve.lineTo(0.9, 0);
sofaCurve.quadraticCurveTo(0.9, -0.3, 0, -0.35);
sofaCurve.quadraticCurveTo(-0.9, -0.3, -0.9, 0);
sofaCurve.lineTo(-1.1, 0);
const sofaExt = new THREE.ExtrudeGeometry(sofaCurve, {depth:0.4, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.05, bevelSegments:8});
const sofaMesh = new THREE.Mesh(sofaExt, mat.sofa);
sofaMesh.rotation.x = -Math.PI/2;
sofaMesh.position.set(W*S/2, 0.2, -D*S*0.55);
sofaMesh.castShadow = true;
scene.add(sofaMesh);
// Sofa back cushions
scene.add(box(2200, 350, 200, mat.sofa, W/2, 400+175, -D*0.55-350));
// Seat cushion
scene.add(box(2200, 200, 500, mat.sofa, W/2, 200, -D*0.55));

// Area rug
scene.add(box(2000, 5, 1500, mat.rug, W/2, 3, -D*0.45));

// Coffee table (round)
const tableGeo = new THREE.CylinderGeometry(0.4, 0.38, 0.05, 32);
const table = new THREE.Mesh(tableGeo, mat.cabinet);
table.position.set(W*S/2, 0.38, -D*S*0.38);
table.castShadow = true;
scene.add(table);
// Table leg
const legGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.35, 16);
const leg = new THREE.Mesh(legGeo, mat.cabinet);
leg.position.set(W*S/2, 0.175, -D*S*0.38);
scene.add(leg);

// Mushroom chair (蘑菇椅)
const mushGeo = new THREE.SphereGeometry(0.25, 16, 12, 0, Math.PI*2, 0, Math.PI*0.6);
const mushChair = new THREE.Mesh(mushGeo, mat.sofa);
mushChair.position.set(0.6, 0.55, -D*S*0.35);
mushChair.castShadow = true;
scene.add(mushChair);
// stem
scene.add(box(200, 450, 200, mat.sofa, 600, 225, -D*0.35));

// Rocking chair
scene.add(box(500, 40, 500, mat.oak, W-500, 350, -D*0.3));
scene.add(box(500, 500, 40, mat.oak, W-500, 600, -D*0.3-230));
// rockers
scene.add(box(40, 30, 550, mat.oak, W-500-200, 15, -D*0.3));
scene.add(box(40, 30, 550, mat.oak, W-500+200, 15, -D*0.3));

// === CHANDELIER ===
const chandelierGroup = new THREE.Group();
const chanY = H - 200;
// central rod
const rodGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.4, 8);
chandelierGroup.add(new THREE.Mesh(rodGeo, mat.copper));
// arms and globes
for(let i=0;i<7;i++){
  const angle = (i/7)*Math.PI*2;
  const r = 0.25;
  const armGeo = new THREE.CylinderGeometry(0.005, 0.005, r, 6);
  const arm = new THREE.Mesh(armGeo, mat.copper);
  arm.rotation.z = Math.PI/2;
  arm.position.set(Math.cos(angle)*r/2, -0.15 + (i%2)*0.08, Math.sin(angle)*r/2);
  chandelierGroup.add(arm);
  
  const globeGeo = new THREE.SphereGeometry(0.06, 16, 12);
  const globe = new THREE.Mesh(globeGeo, mat.globeGlass);
  globe.position.set(Math.cos(angle)*r, -0.15 + (i%2)*0.08, Math.sin(angle)*r);
  chandelierGroup.add(globe);
  
  const gl = new THREE.PointLight('#FFE4B5', 0.3, 3);
  gl.position.copy(globe.position);
  chandelierGroup.add(gl);
}
chandelierGroup.position.set(W*S/2, chanY*S, -D*S*0.42);
scene.add(chandelierGroup);

// Wall sconces
function addSconce(x,z,rotY){
  const sg = new THREE.Group();
  sg.add(new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.12,8), mat.copper));
  const sg2 = new THREE.Mesh(new THREE.SphereGeometry(0.04,12,8), mat.globeGlass);
  sg2.position.y = 0.08;
  sg.add(sg2);
  const sl = new THREE.PointLight('#FFE4B5', 0.2, 2);
  sl.position.y = 0.08;
  sg.add(sl);
  sg.position.set(x*S, 750*S, z*S);
  sg.rotation.y = rotY||0;
  scene.add(sg);
}
addSconce(50, -D/2, 0);
addSconce(W-50, -D/2, 0);

// === LIGHTING ===
const ambLight = new THREE.AmbientLight('#FFF5E0', 0.4);
scene.add(ambLight);

const mainLight = new THREE.DirectionalLight('#FFF0D4', 0.8);
mainLight.position.set(2, 4, 2);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048,2048);
mainLight.shadow.camera.near = 0.1;
mainLight.shadow.camera.far = 15;
mainLight.shadow.camera.left = -5;
mainLight.shadow.camera.right = 5;
mainLight.shadow.camera.top = 5;
mainLight.shadow.camera.bottom = -5;
scene.add(mainLight);

// Warm fill from window side
const windowLight = new THREE.DirectionalLight('#FFEEDD', 0.3);
windowLight.position.set(W*S/2, 2, 3);
scene.add(windowLight);

// Hemisphere light for warm ambient
const hemiLight = new THREE.HemisphereLight('#FFF5E0', '#8B7355', 0.3);
scene.add(hemiLight);

// === INTERACTIVE LABELS ===
const labelContainer = document.getElementById('labelContainer');
const labels = [];
let showLabels = true;
let showZones = false;

const storageLabels = [
  {pos:[200,H/2,-D+200], text:'📦 封闭柜', info:{title:'📦 白色封闭柜',body:'衣物/被褥/换季物品'}},
  {pos:[shelfX,H/2,-D+200], text:'📚 书架', info:{title:'📚 开放书架',body:'书籍 + 装饰品 + 常用物品<br>内置LED灯带'}},
  {pos:[nicheX,H*0.6,-D+200], text:'🏺 壁龛', info:{title:'🏺 拱形壁龛',body:'装饰展示区 + 橡木抽屉柜'}},
  {pos:[washerX,600,600], text:'🫧 洗烘', info:{title:'🫧 洗衣机+烘干机',body:'叠放式·阳台区域'}},
  {pos:[W/2,H-80,-100], text:'🎬 幕布', info:{title:'🎬 电动投影幕布',body:'顶部预留轨道·电动升降'}},
  {pos:[fridgeX,950,-D+500], text:'🧊 冰箱', info:{title:'🧊 双开门冰箱',body:'奶油色高冰箱'}},
];

const zoneLabels = [
  {pos:[W/2,100,-D*0.45], text:'🛋️ 休闲区', info:{title:'🛋️ 休闲区',body:'弧形沙发 + 咖啡桌 + 蘑菇椅'}},
  {pos:[W-500,100,-D*0.15], text:'🏋️ 健身区', info:{title:'🏋️ 健身器材区',body:'可放置瑜伽垫/哑铃等'}},
  {pos:[W/2,H-200,-500], text:'🎥 影院模式', info:{title:'🎥 影院模式',body:'投影幕布+电动窗帘<br>沙发正对幕布'}},
  {pos:[doorX,1050,-D+200], text:'🚪 入户', info:{title:'🚪 入户门',body:'深灰绿色双开门'}},
];

function createLabel(data, isZone){
  const el = document.createElement('div');
  el.className = 'label-3d';
  el.textContent = data.text;
  el.style.display = 'none';
  el.addEventListener('click', ()=>showPopup(data.info, el));
  labelContainer.appendChild(el);
  return {el, pos: new THREE.Vector3(data.pos[0]*S, data.pos[1]*S, data.pos[2]*S), isZone};
}

storageLabels.forEach(d => labels.push(createLabel(d, false)));
zoneLabels.forEach(d => labels.push(createLabel(d, true)));

function updateLabels(){
  labels.forEach(l=>{
    const show = l.isZone ? showZones : showLabels;
    if(!show){l.el.style.display='none';return;}
    const v = l.pos.clone().project(camera);
    if(v.z > 1){l.el.style.display='none';return;}
    l.el.style.display = 'block';
    l.el.style.left = ((v.x+1)/2*innerWidth)+'px';
    l.el.style.top = ((-v.y+1)/2*innerHeight)+'px';
  });
}

// === CLICK DETECTION ===
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickables = scene.children.filter(c=>c.userData?.clickable);

renderer.domElement.addEventListener('click', e=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables);
  if(hits.length>0){
    const d = hits[0].object.userData;
    showPopup({title:d.title, body:d.body});
  }
});

// === POPUP ===
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupBody = document.getElementById('popupBody');

function showPopup(info, anchor){
  popupTitle.textContent = info.title;
  popupBody.innerHTML = info.body;
  popup.style.display = 'block';
  if(anchor){
    const r = anchor.getBoundingClientRect();
    popup.style.left = Math.min(r.left, innerWidth-300)+'px';
    popup.style.top = (r.bottom+8)+'px';
  } else {
    popup.style.left = '50%';
    popup.style.top = '50%';
    popup.style.transform = 'translate(-50%,-50%)';
  }
}
window.hidePopup = ()=>{popup.style.display='none';popup.style.transform='';};

// === CONTROLS ===
window.resetView = ()=>{
  camera.position.copy(defaultCamPos);
  controls.target.copy(defaultTarget);
  controls.update();
};

window.toggleLabels = ()=>{
  showLabels=!showLabels;
  document.getElementById('btnLabels').classList.toggle('active',showLabels);
};

window.toggleZones = ()=>{
  showZones=!showZones;
  document.getElementById('btnZones').classList.toggle('active',showZones);
};

window.toggleScreen = ()=>{
  screenGroup.visible=!screenGroup.visible;
  document.getElementById('btnScreen').classList.toggle('active',screenGroup.visible);
};

// === RENDER LOOP ===
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
