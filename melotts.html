<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure TTS 调试台</title>
<style>
:root{--bg:#08080d;--s1:#101018;--s2:#181824;--s3:#22223a;--bd:#2a2a40;--tx:#d8d8e8;--tx2:#707088;--ac:#6c5ce7;--ac2:#a29bfe;--gn:#00b894;--rd:#e17055;--or:#fdcb6e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px}
.w{max-width:760px;width:100%}
h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--ac2),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--tx2);font-size:13px;margin-bottom:20px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:12px}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border-radius:6px;font-size:12px;margin-bottom:14px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--rd);flex-shrink:0}
.dot.ok{background:var(--gn)}.dot.ld{background:var(--or);animation:p 1s infinite}
@keyframes p{50%{opacity:.3}}
.srv-row{display:flex;gap:6px;margin-bottom:14px}
.srv-row input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:13px;outline:none;font-family:"SF Mono","Fira Code",monospace}
.srv-row input:focus{border-color:var(--ac)}
label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.r2{display:flex;gap:10px;margin-bottom:12px}.r2>div{flex:1}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.r4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
select,input[type=text]{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;color:var(--tx);font-size:13px;outline:none;cursor:pointer}
select:focus,input[type=text]:focus{border-color:var(--ac)}
.sg{margin-bottom:12px}
.sr{display:flex;align-items:center;gap:10px}
.sr input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--bd);border-radius:2px;outline:none;border:none;padding:0}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--ac);cursor:pointer;border:2px solid var(--bg)}
.sv{font-family:"SF Mono",monospace;font-size:13px;color:var(--ac2);min-width:48px;text-align:right}
.hint{font-size:10px;color:var(--tx2);margin-top:2px;line-height:1.3}
textarea{width:100%;min-height:80px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:10px;color:var(--tx);font-size:14px;line-height:1.5;outline:none;resize:vertical;font-family:inherit;margin-bottom:12px}
textarea:focus{border-color:var(--ac)}textarea::placeholder{color:var(--tx2)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;background:linear-gradient(135deg,var(--ac),#5a4bd1);color:#fff}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.3)}
.btn:active{transform:translateY(0)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.sm{padding:8px 14px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;background:var(--ac);color:#fff;transition:all .15s}
.sm:hover{background:var(--ac2)}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pre{padding:4px 9px;font-size:11px;border:1px solid var(--bd);border-radius:5px;background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s}
.pre:hover{border-color:var(--ac);color:var(--tx)}.pre.on{border-color:var(--ac);background:rgba(108,92,231,.15);color:var(--ac2)}
.result{margin-top:12px;display:none}.result.show{display:block}
.result audio{width:100%;margin-top:6px;border-radius:6px}
.meta{display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--tx2);flex-wrap:wrap}
.err{padding:10px;background:rgba(225,112,85,.12);border:1px solid rgba(225,112,85,.25);border-radius:6px;color:var(--rd);font-size:12px;margin-top:10px;display:none}
.err.show{display:block}
.ssml-box{margin-top:10px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:10px;font-family:"SF Mono",monospace;font-size:11px;color:var(--tx2);white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto;display:none}
.ssml-box.show{display:block}
.hi{padding:8px;background:var(--s2);border-radius:6px;margin-bottom:6px}
.hi .t{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.hi .i{font-size:10px;color:var(--tx2);font-family:"SF Mono",monospace}
.hi audio{width:100%;height:28px;margin-top:4px}
.history{max-height:300px;overflow-y:auto}
footer{margin-top:24px;text-align:center;font-size:11px;color:var(--tx2)}
footer a{color:var(--ac2);text-decoration:none}
.voice-info{font-size:11px;color:var(--tx2);padding:6px 10px;background:var(--s2);border-radius:5px;margin-bottom:12px}
.reset-row{display:flex;justify-content:flex-end;margin-bottom:8px;gap:8px}
.tag{display:inline-block;padding:2px 6px;font-size:10px;border-radius:3px;margin-right:3px}
.tag.m{background:rgba(108,92,231,.2);color:var(--ac2)}
.tag.f{background:rgba(253,121,168,.2);color:#fd79a8}
.tag.r{background:rgba(0,184,148,.2);color:var(--gn)}
.dl-row{display:flex;gap:6px;margin-top:8px}
.dl-btn{padding:5px 10px;font-size:11px;font-weight:600;border:1px solid var(--bd);border-radius:5px;background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s;text-decoration:none}
.dl-btn:hover{border-color:var(--ac);color:var(--tx)}
</style>
</head>
<body>
<div class="w">
<h1>🎙 Azure TTS 调试台</h1>
<p class="sub">Azure Cognitive Services · SSML 精细控制 · 情感风格 · 角色扮演</p>

<div class="card">
  <div class="status"><div class="dot" id="dot"></div><span id="stxt">未连接</span></div>
  <div class="srv-row">
    <input id="srv" value="https://innovation-occasionally-complement-monica.trycloudflare.com">
    <button class="sm" onclick="connect()">连接</button>
  </div>
</div>

<div class="card">
  <!-- Voice + Style + Role -->
  <div class="r3">
    <div>
      <label>Voice 声音</label>
      <select id="voice" onchange="updVoice()"></select>
    </div>
    <div>
      <label>Style 风格</label>
      <select id="style"></select>
    </div>
    <div>
      <label>Role 角色</label>
      <select id="role"></select>
    </div>
  </div>
  <div id="vinfo" class="voice-info"></div>

  <!-- Quick presets -->
  <label>快速预设</label>
  <div class="presets" id="presets"></div>

  <!-- Style Degree -->
  <div class="sg">
    <label>Style Degree — 风格强度</label>
    <div class="sr">
      <input type="range" id="stydeg" min="0.01" max="2.0" step="0.01" value="1.0" oninput="uv(this)">
      <span class="sv" id="stydeg_v">1.00</span>
    </div>
    <div class="hint">0.01 = 几乎无情感，1.0 = 正常，2.0 = 情感拉满</div>
  </div>

  <!-- Rate -->
  <div class="sg">
    <label>Rate — 语速调节</label>
    <div class="sr">
      <input type="range" id="rate" min="-50" max="100" step="5" value="0" oninput="uv(this,'%')">
      <span class="sv" id="rate_v">0%</span>
    </div>
    <div class="hint">-50% = 慢一半，0% = 正常，+100% = 快一倍</div>
  </div>

  <!-- Pitch -->
  <div class="sg">
    <label>Pitch — 音调</label>
    <div class="sr">
      <input type="range" id="pitch" min="-12" max="12" step="1" value="0" oninput="uv(this,'st')">
      <span class="sv" id="pitch_v">0st</span>
    </div>
    <div class="hint">半音（semitone）。-12 = 低八度方向，+12 = 高八度方向</div>
  </div>

  <!-- Volume -->
  <div class="sg">
    <label>Volume — 音量</label>
    <div class="sr">
      <input type="range" id="vol" min="-50" max="50" step="5" value="0" oninput="uv(this,'%')">
      <span class="sv" id="vol_v">0%</span>
    </div>
  </div>

  <!-- Output Format -->
  <div class="r4" style="margin-top:4px">
    <div>
      <label>Output Format 输出格式</label>
      <select id="fmt"></select>
    </div>
    <div style="display:flex;align-items:flex-end">
      <div class="reset-row" style="margin-bottom:0;width:100%;justify-content:flex-end">
        <button class="sm" onclick="showSSML()" style="background:var(--s3)">📋 预览 SSML</button>
        <button class="sm" onclick="resetAll()" style="background:var(--s3)">↻ 重置</button>
      </div>
    </div>
  </div>

  <div class="ssml-box" id="ssml"></div>

  <label style="margin-top:12px">文本</label>
  <textarea id="text" placeholder="输入文本…" maxlength="2000">在二战期间，统计学家亚伯拉罕·瓦尔德面对一个看似简单的问题。军方请他分析返航轰炸机上的弹孔分布，以决定哪些部位需要加装装甲。</textarea>

  <button class="btn" id="go" onclick="synth()" disabled>🎙 合成 (Ctrl+Enter)</button>
  <div class="err" id="err"></div>
  <div class="result" id="res">
    <audio id="aud" controls></audio>
    <div class="meta" id="meta"></div>
    <div class="dl-row" id="dlrow"></div>
  </div>
</div>

<div class="card">
  <label>历史</label>
  <div class="history" id="hist"><div style="text-align:center;color:var(--tx2);padding:16px;font-size:12px">暂无</div></div>
</div>

<footer><a href="https://learn.microsoft.com/en-us/azure/ai-services/speech-service/" target="_blank">Azure Speech</a> · Cove 🌊</footer>
</div>

<script>
let VOICES={}, FORMATS={}, ok=false, hist=[], lastBlob=null, lastFmtKey='mp3-24k-96';
const $=id=>document.getElementById(id);

const ROLE_LABELS = {
  "default":"默认","Girl":"女孩","Boy":"男孩",
  "YoungAdultFemale":"青年女","YoungAdultMale":"青年男",
  "OlderAdultFemale":"中年女","OlderAdultMale":"中年男",
  "SeniorFemale":"老年女","SeniorMale":"老年男",
  "Narrator":"旁白",
};

const PRESETS = [
  {name:"🎭 emo 科普", voice:"zh-CN-YunxiNeural", style:"depressed", role:"default", deg:1.3, rate:"-10%", pitch:"-2st", vol:"0%"},
  {name:"📖 沉稳叙述", voice:"zh-CN-YunjianNeural", style:"narration-relaxed", role:"default", deg:1.0, rate:"-5%", pitch:"-1st", vol:"0%"},
  {name:"🎬 纪录片", voice:"zh-CN-YunjianNeural", style:"documentary-narration", role:"default", deg:1.2, rate:"0%", pitch:"0st", vol:"0%"},
  {name:"🎬 纪录片·旁白", voice:"zh-CN-YunjianNeural", style:"documentary-narration", role:"Narrator", deg:1.2, rate:"-5%", pitch:"-1st", vol:"0%"},
  {name:"👴 老者讲述", voice:"zh-CN-YunjianNeural", style:"narration-relaxed", role:"SeniorMale", deg:1.0, rate:"-10%", pitch:"-2st", vol:"0%"},
  {name:"😔 忧郁", voice:"zh-CN-YunxiNeural", style:"sad", role:"default", deg:1.5, rate:"-15%", pitch:"-3st", vol:"0%"},
  {name:"💬 轻松聊天", voice:"zh-CN-YunxiNeural", style:"chat", role:"default", deg:1.0, rate:"5%", pitch:"0st", vol:"0%"},
  {name:"📰 新闻", voice:"zh-CN-YunyangNeural", style:"narration-professional", role:"default", deg:1.0, rate:"0%", pitch:"0st", vol:"0%"},
  {name:"🌸 温柔女声", voice:"zh-CN-XiaoxiaoNeural", style:"gentle", role:"default", deg:1.2, rate:"-5%", pitch:"0st", vol:"0%"},
  {name:"😢 感伤女声", voice:"zh-CN-XiaomoNeural", style:"depressed", role:"default", deg:1.4, rate:"-10%", pitch:"-1st", vol:"0%"},
  {name:"👧 少女视角", voice:"zh-CN-XiaomoNeural", style:"gentle", role:"Girl", deg:1.0, rate:"0%", pitch:"+1st", vol:"0%"},
];

function renderPresets(){
  $('presets').innerHTML = PRESETS.map((p,i)=>`<div class="pre" onclick="applyPreset(${i})">${p.name}</div>`).join('');
}

function applyPreset(i){
  const p=PRESETS[i];
  $('voice').value=p.voice; updVoice();
  $('style').value=p.style;
  $('role').value=p.role;
  $('stydeg').value=p.deg; $('stydeg_v').textContent=p.deg.toFixed(2);
  $('rate').value=parseInt(p.rate); $('rate_v').textContent=p.rate;
  $('pitch').value=parseInt(p.pitch); $('pitch_v').textContent=p.pitch;
  $('vol').value=parseInt(p.vol); $('vol_v').textContent=p.vol;
  document.querySelectorAll('.pre').forEach((el,j)=>el.classList.toggle('on',j===i));
}

function resetAll(){
  $('stydeg').value=1; $('stydeg_v').textContent='1.00';
  $('rate').value=0; $('rate_v').textContent='0%';
  $('pitch').value=0; $('pitch_v').textContent='0st';
  $('vol').value=0; $('vol_v').textContent='0%';
  $('style').value='default';
  $('role').value='default';
  $('fmt').value='mp3-24k-96';
  document.querySelectorAll('.pre').forEach(el=>el.classList.remove('on'));
}

function uv(el,suffix){
  const v=parseFloat(el.value);
  if(suffix) $(el.id+'_v').textContent=(v>=0?'+':'')+v+suffix;
  else $(el.id+'_v').textContent=v.toFixed(2);
  document.querySelectorAll('.pre').forEach(el=>el.classList.remove('on'));
}

function populateFormats(){
  const sel=$('fmt');
  sel.innerHTML='';
  for(const[k,f] of Object.entries(FORMATS)){
    const o=document.createElement('option');
    o.value=k; o.textContent=f.label;
    sel.appendChild(o);
  }
  sel.value='mp3-24k-96';
}

async function connect(){
  const u=$('srv').value.replace(/\/+$/,'');
  $('dot').className='dot ld'; $('stxt').textContent='连接中…';
  try{
    const [vr, fr] = await Promise.all([
      fetch(u+'/voices',{signal:AbortSignal.timeout(5000)}),
      fetch(u+'/formats',{signal:AbortSignal.timeout(5000)}).catch(()=>null),
    ]);
    VOICES=await vr.json();
    if(fr && fr.ok) FORMATS=await fr.json();
    else FORMATS={"mp3-24k-96":{"id":"audio-24khz-96kbitrate-mono-mp3","label":"MP3 24kHz 96kbps","mime":"audio/mpeg"}};
    populateVoices();
    populateFormats();
    $('dot').className='dot ok'; $('stxt').textContent='已连接 · '+Object.keys(VOICES).length+' voices · '+Object.keys(FORMATS).length+' formats';
    ok=true; $('go').disabled=false;
    localStorage.setItem('aztts_srv',u);
  }catch(e){
    $('dot').className='dot'; $('stxt').textContent='连接失败: '+e.message;
    ok=false; $('go').disabled=true;
  }
}

function populateVoices(){
  const sel=$('voice');
  sel.innerHTML='';
  for(const[id,v] of Object.entries(VOICES)){
    const o=document.createElement('option');
    o.value=id;
    const g=v.gender==='Male'?'♂':'♀';
    o.textContent=`${g} ${v.name}`;
    sel.appendChild(o);
  }
  updVoice();
}

function updVoice(){
  const id=$('voice').value;
  const v=VOICES[id]; if(!v) return;
  // Styles
  const st=$('style');
  st.innerHTML='';
  (v.styles||['default']).forEach(s=>{
    const o=document.createElement('option'); o.value=s; o.textContent=s; st.appendChild(o);
  });
  // Roles
  const rl=$('role');
  rl.innerHTML='';
  const roles=v.roles||['default'];
  roles.forEach(r=>{
    const o=document.createElement('option'); o.value=r;
    o.textContent=ROLE_LABELS[r]||r;
    rl.appendChild(o);
  });
  // Info
  const g=v.gender==='Male'?'<span class="tag m">男声</span>':'<span class="tag f">女声</span>';
  const rc=roles.filter(r=>r!=='default').length;
  const roleInfo=rc>0?` · <span class="tag r">${rc} roles</span>`:'';
  $('vinfo').innerHTML=`${g} ${v.name} · ${v.age} · ${v.styles.length} styles${roleInfo} · <code>${id}</code>`;
}

function getFmtId(){
  const k=$('fmt').value;
  return (FORMATS[k]||{}).id||'audio-24khz-96kbitrate-mono-mp3';
}

async function showSSML(){
  const u=$('srv').value.replace(/\/+$/,'');
  const q=new URLSearchParams(getParams());
  try{
    const r=await fetch(u+'/ssml-preview?'+q);
    const d=await r.json();
    $('ssml').textContent=d.ssml;
    $('ssml').className='ssml-box show';
  }catch(e){}
}

function getParams(){
  return {
    text:$('text').value.trim(),
    voice:$('voice').value,
    style:$('style').value,
    style_degree:$('stydeg').value,
    rate:$('rate').value+'%',
    pitch:$('pitch').value+'st',
    volume:$('vol').value+'%',
    role:$('role').value,
    output_format:getFmtId(),
  };
}

async function synth(){
  if(!ok) return;
  const url=$('srv').value.replace(/\/+$/,'');
  const p=getParams();
  if(!p.text) return;

  $('go').disabled=true; $('go').textContent='⏳ 合成中…';
  $('err').className='err'; $('ssml').className='ssml-box';

  try{
    const qs=new URLSearchParams(p);
    const r=await fetch(url+'/tts?'+qs,{signal:AbortSignal.timeout(30000)});
    if(!r.ok){const e=await r.json();throw new Error(e.error||r.statusText);}
    const blob=await r.blob();
    lastBlob=blob;
    lastFmtKey=$('fmt').value;
    const au=URL.createObjectURL(blob);
    const ms=r.headers.get('X-Elapsed-Ms')||'?';
    const fmtLabel=(FORMATS[$('fmt').value]||{}).label||$('fmt').value;
    const roleLabel=$('role').value!=='default'?` · 🎭 ${ROLE_LABELS[$('role').value]||$('role').value}`:'';

    $('aud').src=au; $('res').className='result show';
    $('meta').innerHTML=`<span>⏱ ${ms}ms</span><span>🗣 ${p.voice.split('-').slice(-1)[0]}</span><span>🎭 ${p.style}</span><span>💪 ${parseFloat(p.style_degree).toFixed(2)}</span><span>⚡ ${p.rate}</span><span>🎵 ${p.pitch}</span>${roleLabel}<span>📀 ${fmtLabel}</span>`;
    // Download button
    const ext=lastFmtKey.startsWith('wav')?'wav':lastFmtKey.startsWith('ogg')?'ogg':'mp3';
    $('dlrow').innerHTML=`<a class="dl-btn" href="${au}" download="tts-output.${ext}">⬇ 下载音频</a>`;
    $('aud').play();

    hist.unshift({text:p.text,voice:p.voice,style:p.style,role:p.role,deg:p.style_degree,rate:p.rate,pitch:p.pitch,fmt:fmtLabel,ms,au,time:new Date()});
    if(hist.length>30)hist.pop();
    renderHist();
  }catch(e){
    $('err').textContent='❌ '+e.message; $('err').className='err show';
  }finally{
    $('go').disabled=false; $('go').textContent='🎙 合成 (Ctrl+Enter)';
  }
}

function renderHist(){
  const el=$('hist');
  if(!hist.length){el.innerHTML='<div style="text-align:center;color:var(--tx2);padding:16px;font-size:12px">暂无</div>';return;}
  el.innerHTML=hist.map(h=>{
    const roleStr=h.role&&h.role!=='default'?` · role=${h.role}`:'';
    return `<div class="hi">
    <div class="t">${esc(h.text)}</div>
    <div class="i">${h.voice} · ${h.style}${roleStr} · deg=${h.deg} · rate=${h.rate} · pitch=${h.pitch} · ${h.fmt} · ${h.ms}ms</div>
    <audio src="${h.au}" controls preload="none"></audio>
  </div>`;
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

$('text').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();synth();}});

// Init
renderPresets();
const sv=localStorage.getItem('aztts_srv');
if(sv)$('srv').value=sv;
if($('srv').value)setTimeout(connect,300);
</script>
</body>
</html>
