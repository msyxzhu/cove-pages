<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厨房3D收纳规划 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
canvas{display:block}
#controls{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:16px;z-index:100;min-width:180px;color:#fff}
#controls h3{font-size:14px;margin-bottom:12px;font-weight:600;opacity:0.9}
.ctrl-btn{display:block;width:100%;padding:8px 12px;margin:4px 0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:13px;cursor:pointer;text-align:left;transition:background 0.2s}
.ctrl-btn:hover{background:rgba(255,255,255,0.2)}
.ctrl-btn.active{background:rgba(196,147,90,0.4);border-color:rgba(196,147,90,0.6)}
#popup{position:fixed;display:none;background:rgba(30,25,20,0.95);backdrop-filter:blur(16px);border:1px solid rgba(196,147,90,0.4);border-radius:14px;padding:18px;color:#fff;max-width:320px;z-index:200;font-size:13px;line-height:1.7;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
#popup h4{font-size:15px;margin-bottom:8px;color:#D4A56A}
#popup .close{position:absolute;top:8px;right:12px;cursor:pointer;font-size:18px;opacity:0.6}
#popup .close:hover{opacity:1}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a1a;z-index:999;color:#D4A56A;font-size:18px}
</style>
</head>
<body>
<div id="loading">加载中...</div>
<div id="controls">
<h3>🏠 厨房规划</h3>
<button class="ctrl-btn" id="btnZones">🏷️ 功能区标注</button>
<button class="ctrl-btn" id="btnFlow">➡️ 动线箭头</button>
<button class="ctrl-btn" id="btnStorage">📦 收纳标签</button>
<button class="ctrl-btn" id="btnReset">🔄 重置视角</button>
</div>
<div id="popup"><span class="close" onclick="document.getElementById('popup').style.display='none'">✕</span><h4 id="popupTitle"></h4><div id="popupBody"></div></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{CSS2DRenderer,CSS2DObject}from'three/addons/renderers/CSS2DRenderer.js';

const S=0.001;// mm to meters
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x2a2520);
scene.fog=new THREE.Fog(0x2a2520,8,14);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

const labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth,window.innerHeight);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.top='0';
labelRenderer.domElement.style.pointerEvents='none';
document.body.appendChild(labelRenderer.domElement);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.05,20);
const defCamPos=new THREE.Vector3(3.8,1.6,-1.5);
const defCamTarget=new THREE.Vector3(0.8,0.9,1.2);
camera.position.copy(defCamPos);

const controls=new OrbitControls(camera,renderer.domElement);
controls.target.copy(defCamTarget);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.maxPolarAngle=Math.PI*0.52;
controls.minDistance=1.5;controls.maxDistance=8;
controls.update();

// Materials
const mat={
  oak:new THREE.MeshStandardMaterial({color:0xC4935A,roughness:0.7,metalness:0.0}),
  oakDark:new THREE.MeshStandardMaterial({color:0xB08040,roughness:0.65}),
  white:new THREE.MeshStandardMaterial({color:0xF5F0E8,roughness:0.4,metalness:0.0}),
  counter:new THREE.MeshStandardMaterial({color:0xF0EDE8,roughness:0.25,metalness:0.05}),
  floor:new THREE.MeshStandardMaterial({color:0xD5CCBE,roughness:0.6}),
  wall:new THREE.MeshStandardMaterial({color:0xE8DFD0,roughness:0.5}),
  backsplash:new THREE.MeshStandardMaterial({color:0xE5D9C8,roughness:0.35}),
  ceiling:new THREE.MeshStandardMaterial({color:0xFAF8F5,roughness:0.8}),
  black:new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.3,metalness:0.4}),
  steel:new THREE.MeshStandardMaterial({color:0xCCCCCC,roughness:0.2,metalness:0.8}),
  kickboard:new THREE.MeshStandardMaterial({color:0x3a3530,roughness:0.8}),
  fridge:new THREE.MeshStandardMaterial({color:0xF0D4C0,roughness:0.3,metalness:0.1}),
  door:new THREE.MeshStandardMaterial({color:0x3A4540,roughness:0.5,metalness:0.2}),
  glass:new THREE.MeshStandardMaterial({color:0xCCDDEE,roughness:0.1,metalness:0.0,transparent:true,opacity:0.3}),
  fabric:new THREE.MeshStandardMaterial({color:0xD5C8B5,roughness:0.9}),
  arrow:new THREE.MeshBasicMaterial({color:0xD4A56A,transparent:true,opacity:0.6}),
  led:new THREE.MeshBasicMaterial({color:0xFFF5E0}),
  green:new THREE.MeshStandardMaterial({color:0x5A8A50,roughness:0.8}),
  pot:new THREE.MeshStandardMaterial({color:0xC0A080,roughness:0.6}),
};

// Coordinate system: X=right, Z=depth into kitchen (back wall at Z=max), Y=up
// Back wall along X axis at Z=2.811... wait, let me set up coordinates clearly.
// Let's say: back wall runs along X, at Z=0 (the wall surface faces -Z, cabinets face -Z toward viewer)
// Left wall runs along Z, at X=0
// So L-shape corner is at (0, 0, 0) floor level
// Back wall: from X=0 to X=2.811, at Z=0 (wall at Z=0.6 behind cabinets)
// Left wall: from Z=0 to Z=2.141, at X=0 (wall at X=-0.6 behind cabinets? no)
// Actually: cabinets depth 600mm. Back wall cabinets face toward -Z (into room). Left wall cabinets face toward +X (into room).
// Back wall surface at Z=0.6 (behind cabinets). Cabinet fronts at Z=0.
// Left wall surface at X=-0.6. Cabinet fronts at X=0... Hmm, let me rethink.

// Simpler: place the L inner corner at origin. 
// Back wall goes in +X direction, wall surface at Z=backDepth (0.6). Cabinets from Z=0 to Z=0.6.
// Left wall goes in +Z direction, wall surface at X=-0.6... no wait.
// Let me just do: back wall runs along +X at the "back" (high Z). Left wall runs along +Z at the "left" (low X).
// Room opens toward +X and -Z.

// REVISED simple layout:
// Origin = inner corner of L at floor level.
// Back wall: extends from X=0 to X=2.811m along +X. Wall plane at Z=0, cabinets extend toward -Z (into room).
// Left wall: extends from Z=0 to Z=-2.141m along -Z. Wall plane at X=0, cabinets extend toward +X (into room).
// Island: ~892mm from back wall cabinets, so at Z = -(0.6+0.892) = -1.492, extending along X.
// Fridge and door on the far side.

const BW=2.811, LW=2.141; // back wall width, left wall length
const CD=0.6, CH=0.82, KB=0.08, CT=0.04; // cabinet depth, height, kickboard, countertop
const WC_BTM=0.9+0.65, WC_H=0.65; // wall cabinet bottom Y, height
const CEIL=2.28;
const COUNTER_H=KB+CH+CT; // 0.94

function box(w,h,d,material,x,y,z){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g,material);
  m.position.set(x,y,z);
  m.castShadow=true;m.receiveShadow=true;
  return m;
}

const clickables=[];
function addClickable(mesh,title,body){
  mesh.userData={title,body};
  clickables.push(mesh);
}

// ===== ROOM STRUCTURE =====
// Floor
const floor=box(6,0.02,6,mat.floor,1.5,0,-1.5);
floor.receiveShadow=true;
scene.add(floor);

// Ceiling
scene.add(box(6,0.02,6,mat.ceiling,1.5,CEIL,-1.5));

// Back wall (at Z=CD = 0.6, extends upward)
scene.add(box(BW+0.15,CEIL,0.12,mat.wall,BW/2,CEIL/2,CD+0.06));
// Left wall (at X=-CD=-0.6... no. Left wall surface at X=0 but wall behind cabinets)
// Actually wall is behind cabinets. Back wall cabinets are at Z=0..0.6, wall at Z=0.6.
// Left wall cabinets at X=0..(-0.6), wall at X=-0.6.
// Hmm let me flip: left wall cabinets extend into room (+X), so they go from X=0 to X=0.6. Wall at X=0... no.
// Let me just pick: Left wall plane at X=0. Left wall cabinets face +X, from X=0 to X=CD.
// Back wall plane at Z=0. Back wall cabinets face -Z, from Z=0 to Z=-CD.
// Then counter fronts: back wall at Z=-0.6, left wall at X=0.6.
// Island at Z=-(0.6+0.892)=-1.492

// RE-REDO with this:
scene.remove(floor);
while(scene.children.length)scene.remove(scene.children[0]);

// Back wall at Z=0 surface. Cabinets Z=0 to Z=-0.6 (fronts at Z=-0.6).
// Left wall at X=0 surface. Cabinets X=0 to X=0.6 (fronts at X=0.6).
// Island centered around Z=-0.6-0.892=-1.492

// Walls
const wallBack=box(BW+0.3,CEIL,0.15,mat.wall,BW/2,CEIL/2,0.075);
scene.add(wallBack);
const wallLeft=box(0.15,CEIL,LW+0.3,mat.wall,-0.075,CEIL/2,-LW/2);
scene.add(wallLeft);
// Right side wall (partial, where fridge and door are) - at X=BW+something
// Far wall opposite back wall - not needed, room opens

// Floor
const floorMesh=box(5,0.02,5,mat.floor,1.5,-0.01,-2);
floorMesh.receiveShadow=true;scene.add(floorMesh);
// Ceiling
scene.add(box(5,0.02,5,mat.ceiling,1.5,CEIL,-2));

// Backsplash - back wall
scene.add(box(BW,CEIL-COUNTER_H-0.05,0.01,mat.backsplash,BW/2,(COUNTER_H+CEIL)/2,-0.005));
// Backsplash - left wall
scene.add(box(0.01,CEIL-COUNTER_H-0.05,LW,mat.backsplash,0.005,(COUNTER_H+CEIL)/2,-LW/2));

// Window behind sink (back wall, centered in sink zone)
// Sink zone: from X=0.6 to X=0.6+1.611=2.211. Center at X=1.506
const winW=0.7, winH=0.8, winBot=COUNTER_H+0.35;
const winX=0.6+1.611/2;
const winFrame=box(winW+0.06,winH+0.06,0.05,mat.oakDark,winX,winBot+winH/2,0.04);
scene.add(winFrame);
const winGlass=box(winW,winH,0.01,mat.glass,winX,winBot+winH/2,0.03);
scene.add(winGlass);

// ===== BACK WALL CABINETS =====
// Section 1: Cooktop zone X=0..0.6
const bx0=0; // start X

// Kickboard
function kickboard(x,z,w,d){return box(w,KB,d,mat.kickboard,x+w/2,KB/2,z-d/2)}

// -- Back wall base cabinets --
// Cooktop base (oven stack) X=0..0.6
const ovenCab=box(0.6,CH,CD,mat.oak,0.3,KB+CH/2,-CD/2);
scene.add(ovenCab);scene.add(kickboard(0,0,0.6,CD));
// Oven fronts (double stack black)
const oven1=box(0.56,0.38,0.03,mat.black,0.3,KB+0.2,-CD-0.015);
scene.add(oven1);
addClickable(oven1,'🔥 烤箱/蒸箱','嵌入式烤箱(下层) + 蒸箱(上层)\n烹饪利器，靠近灶台方便操作');
const oven2=box(0.56,0.38,0.03,mat.black,0.3,KB+0.6,-CD-0.015);
scene.add(oven2);
addClickable(oven2,'🔥 蒸箱','嵌入式蒸箱\n与烤箱上下叠放，节省空间');

// Sink zone base cabinets X=0.6..2.211 (4 doors: 402+403+403+403)
const sinkDoors=[0.402,0.403,0.403,0.403];
let sx=0.6;
const sinkStorage=[
  {t:'🗑️ 水槽下方',b:'垃圾桶（干湿分离）+ 清洁用品\n净水器滤芯也放这里'},
  {t:'🔪 抽屉柜',b:'上层抽屉: 刀具 + 砧板\n下层: 锅具 + 厨具'},
  {t:'🔪 抽屉柜',b:'上层抽屉: 刀具 + 砧板\n下层: 锅具 + 厨具'},
  {t:'🍳 抽屉柜',b:'上层: 常用小工具\n下层: 备用锅具'},
];
sinkDoors.forEach((w,i)=>{
  const c=box(w-0.005,CH,CD,mat.oak,sx+w/2,KB+CH/2,-CD/2);
  scene.add(c);
  const door=box(w-0.01,CH-0.01,0.02,mat.oak,sx+w/2,KB+CH/2,-CD-0.01);
  scene.add(door);
  addClickable(door,sinkStorage[i].t,sinkStorage[i].b);
  scene.add(kickboard(sx,0,w,CD));
  sx+=w;
});

// Appliance tower X=2.211..2.811
const atX=2.211;
const atCab=box(0.6,CH,CD,mat.oak,atX+0.3,KB+CH/2,-CD/2);
scene.add(atCab);scene.add(kickboard(atX,0,0.6,CD));
// Dishwasher front (lower half)
const dw=box(0.56,0.4,0.03,mat.black,atX+0.3,KB+0.2,-CD-0.015);
scene.add(dw);
addClickable(dw,'🫧 洗碗机','内嵌式洗碗机\n容量13套，靠近水槽方便接水管');
// Water dispenser (upper half)
const wd=box(0.56,0.35,0.03,mat.black,atX+0.3,KB+0.6,-CD-0.015);
scene.add(wd);
addClickable(wd,'💧 管线机','即热管线机\n接净水器，随时出热水/常温水');

// Countertop - back wall (full length)
const counterBack=box(BW,CT,CD+0.02,mat.counter,BW/2,KB+CH+CT/2,-CD/2);
scene.add(counterBack);

// -- Back wall wall cabinets --
const wcY=WC_BTM, wcH=WC_H;
// Above cooktop: range hood + cabinet above
const hood=box(0.9,0.06,0.5,mat.black,0.45,wcY-0.15,-0.25);
scene.add(hood);
// Hood chimney
scene.add(box(0.3,0.4,0.3,mat.black,0.45,wcY+0.1,-0.15));
const wcCooktop=box(0.6,wcH*0.5,0.35,mat.white,0.3,wcY+wcH*0.75,-0.175);
scene.add(wcCooktop);
addClickable(wcCooktop,'🧂 调料柜','调料收纳 + 不常用锅具\n靠近灶台，烹饪时随手拿');

// Above sink: wall cabinets with open shelf section
const wcSink1=box(0.8,wcH,0.35,mat.white,1.0,wcY+wcH/2,-0.175);
scene.add(wcSink1);
addClickable(wcSink1,'🍽️ 碗碟柜','碗碟沥水架 + 杯子\n最常用区域，洗完直接放');
// Open shelf section
const wcShelf=box(0.4,wcH,0.3,mat.oak,1.6,wcY+wcH/2,-0.15);
scene.add(wcShelf);
// Shelf dividers
scene.add(box(0.38,0.01,0.28,mat.oak,1.6,wcY+wcH*0.33,-0.15));
scene.add(box(0.38,0.01,0.28,mat.oak,1.6,wcY+wcH*0.66,-0.15));
// LED strip under open shelf
scene.add(box(0.38,0.005,0.02,mat.led,1.6,wcY-0.01,-0.02));

const wcSink2=box(0.4,wcH,0.35,mat.white,2.0,wcY+wcH/2,-0.175);
scene.add(wcSink2);
addClickable(wcSink2,'🍽️ 杯碟柜','备用杯碟 + 保鲜盒\n用完洗完直接归位');

// Above appliance tower
const wcAT=box(0.6,wcH,0.35,mat.white,atX+0.3,wcY+wcH/2,-0.175);
scene.add(wcAT);
addClickable(wcAT,'📦 收纳柜','保鲜膜/袋/密封盒\n一次性用品备用区');

// ===== COOKTOP (4 burners) =====
const cooktopY=COUNTER_H+0.005;
// Burner grates
for(let r=0;r<2;r++)for(let c=0;c<2;c++){
  const bx=0.15+c*0.28, bz=-0.18-r*0.24;
  const grate=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.015,16),mat.black);
  grate.position.set(bx,cooktopY,bz);scene.add(grate);
  // Burner ring
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.04,0.008,8,24),mat.steel);
  ring.rotation.x=Math.PI/2;ring.position.set(bx,cooktopY+0.01,bz);scene.add(ring);
}

// ===== SINK =====
const sinkX=0.6+1.611/2, sinkZ=-CD/2;
const sinkBasin=box(0.5,0.02,0.4,mat.steel,sinkX,COUNTER_H-0.01,sinkZ);
scene.add(sinkBasin);
// Faucet
const faucetBase=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.3,12),mat.steel);
faucetBase.position.set(sinkX,COUNTER_H+0.15,sinkZ+0.15);scene.add(faucetBase);
const faucetArm=box(0.02,0.02,0.15,mat.steel,sinkX,COUNTER_H+0.3,sinkZ+0.08);
scene.add(faucetArm);

// ===== LEFT WALL CABINETS =====
const lDoors=[0.411,0.410,0.410,0.410];
let lz=0;
const lStorage=[
  {t:'🍚 米面粮油',b:'大件储粮区\n米桶 + 面粉 + 食用油\n建议用密封储粮桶'},
  {t:'🫙 干货调味',b:'干货 + 调味品备用\n八角花椒干辣椒等\n建议用统一收纳罐'},
  {t:'🔧 备用厨具',b:'备用厨具 + 小工具\n打蛋器/量杯/模具等\n不常用但需要时找得到'},
  {t:'🗑️ 一次性用品',b:'一次性用品 + 垃圾袋\n保鲜袋/锡纸/厨房纸\n消耗品集中存放'},
];
lDoors.forEach((w,i)=>{
  const cz=-(lz+w/2);
  const c=box(CD,CH,w-0.005,mat.oak,CD/2,KB+CH/2,cz);
  scene.add(c);
  const door=box(0.02,CH-0.01,w-0.01,mat.oak,CD+0.01,KB+CH/2,cz);
  scene.add(door);
  addClickable(door,lStorage[i].t,lStorage[i].b);
  scene.add(box(w,KB,CD,mat.kickboard,CD/2,KB/2,cz));
  lz+=w;
});

// Left wall countertop
const counterLeft=box(CD+0.02,CT,LW,mat.counter,CD/2,KB+CH+CT/2,-LW/2);
scene.add(counterLeft);

// Left wall - wall cabinets (2 closed + 2 open shelves)
const lwcW=LW/4;
// Closed
for(let i=0;i<2;i++){
  const cz=-(i*lwcW+lwcW/2);
  const wc=box(0.35,wcH,lwcW-0.01,mat.white,0.175,wcY+wcH/2,cz);
  scene.add(wc);
  addClickable(wc,'🍽️ 储物柜','不常用餐具 + 节日用品\n火锅用具/烧烤盘等');
}
// Open shelves with LED
for(let i=2;i<4;i++){
  const cz=-(i*lwcW+lwcW/2);
  const shelf=box(0.3,wcH,lwcW-0.01,mat.oak,0.15,wcY+wcH/2,cz);
  scene.add(shelf);
  // Shelf boards
  scene.add(box(0.28,0.01,lwcW-0.03,mat.oak,0.15,wcY+wcH*0.33,cz));
  scene.add(box(0.28,0.01,lwcW-0.03,mat.oak,0.15,wcY+wcH*0.66,cz));
  // LED
  scene.add(box(0.28,0.005,0.02,mat.led,0.15,wcY-0.01,cz+lwcW/2-0.05));
  addClickable(shelf,'🧂 开放架','常用调料瓶 + 装饰品\n好看的瓶瓶罐罐放这里\n建议统一风格的收纳瓶');
}

// ===== ISLAND =====
const islandZ=-CD-0.892;
const islandX=0.6; // starts roughly aligned
const islandW=1.6, islandD=0.6;
// Island body
const island=box(islandW,CH,islandD,mat.oak,islandX+islandW/2,KB+CH/2,islandZ-islandD/2);
scene.add(island);
scene.add(box(islandW,KB,islandD,mat.kickboard,islandX+islandW/2,KB/2,islandZ-islandD/2));
// Island countertop
scene.add(box(islandW+0.04,CT,islandD+0.04,mat.counter,islandX+islandW/2,KB+CH+CT/2,islandZ-islandD/2));

// Island kitchen side doors (facing +Z toward back wall)
for(let i=0;i<3;i++){
  const dw=islandW/3;
  const dx=islandX+dw*i+dw/2;
  const d=box(dw-0.01,CH-0.01,0.02,mat.oak,dx,KB+CH/2,islandZ+0.01);
  scene.add(d);
  addClickable(d,'🍽️ 中岛储物','碗碟 + 杯子 + 餐具\n靠近餐桌，上菜方便\n日常餐具都放这里');
}

// Island entrance side - open shoe shelves (facing -Z)
for(let i=0;i<2;i++){
  for(let j=0;j<3;j++){
    const shelfY=KB+0.05+j*0.25;
    scene.add(box(islandW/2-0.02,0.01,islandD-0.05,mat.oak,islandX+islandW/4+i*islandW/2,shelfY,islandZ-islandD/2));
  }
}

// ===== DINING TABLE extending from island =====
const tableW=1.2, tableD=0.8, tableH=0.75;
const tableX=islandX+islandW/2;
const tableZ=islandZ-islandD-0.05-tableD/2;
const tableTop=box(tableW,0.04,tableD,mat.oakDark,tableX,tableH,tableZ);
scene.add(tableTop);
// Table legs
for(let i=0;i<4;i++){
  const lx=tableX+(i%2===0?-0.5:0.5)*tableW*0.4;
  const lz=tableZ+(i<2?-0.35:0.35)*tableD;
  scene.add(box(0.04,tableH-0.04,0.04,mat.oakDark,lx,tableH/2-0.02,lz));
}

// Chairs (4)
function makeChair(x,z,rotY){
  const g=new THREE.Group();
  // Seat
  g.add(box(0.4,0.03,0.4,mat.oak,0,0.45,0));
  // Back
  g.add(box(0.38,0.4,0.03,mat.fabric,0,0.68,-0.18));
  // Legs
  for(let i=0;i<4;i++){
    const lx=(i%2===0?-0.16:0.16);
    const lz=(i<2?-0.16:0.16);
    g.add(box(0.03,0.45,0.03,mat.oak,lx,0.225,lz));
  }
  g.position.set(x,0,z);
  g.rotation.y=rotY;
  scene.add(g);
}
makeChair(tableX-0.5,tableZ,0);
makeChair(tableX+0.5,tableZ,0);
makeChair(tableX,tableZ-0.45,Math.PI/2);
makeChair(tableX,tableZ+0.45,-Math.PI/2);

// ===== FRIDGE =====
// On the wall between kitchen and entrance, at X=BW+0.3ish, far from L
const fridgeX=BW+0.15, fridgeZ=-0.3;
const fridgeBody=box(0.8,1.8,0.65,mat.fridge,fridgeX+0.4,0.9,fridgeZ);
scene.add(fridgeBody);
// Door line
scene.add(box(0.005,1.7,0.66,mat.white,fridgeX+0.4,0.9,fridgeZ));
// Handles
scene.add(box(0.02,0.3,0.03,mat.steel,fridgeX+0.38,1.2,fridgeZ-0.34));
scene.add(box(0.02,0.3,0.03,mat.steel,fridgeX+0.42,1.2,fridgeZ-0.34));
addClickable(fridgeBody,'🧊 冰箱','双门大冰箱\n奶油粉色，容量500L+\n位于入口旁，买菜回来直接放');

// ===== ENTRANCE DOOR =====
const doorX=BW+0.1, doorZ=-1.5;
scene.add(box(1.0,2.1,0.08,mat.door,doorX+0.5,1.05,doorZ));
// Door frame
scene.add(box(1.06,0.05,0.1,mat.door,doorX+0.5,2.12,doorZ));

// ===== POTTED PLANTS =====
function plant(x,y,z){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.05,0.1,12),mat.pot));
  g.children[0].position.y=0.05;
  const leaves=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8),mat.green);
  leaves.position.y=0.14;leaves.scale.y=1.3;g.add(leaves);
  g.position.set(x,y,z);scene.add(g);
}
plant(0.15,COUNTER_H,-0.15);
plant(atX+0.5,COUNTER_H,-0.15);
plant(islandX+islandW-0.1,COUNTER_H,islandZ-islandD/2);

// ===== LIGHTING =====
const ambient=new THREE.AmbientLight(0xFFF5E0,0.4);
scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xFFF8F0,0.8);
dirLight.position.set(2,4,-2);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);
dirLight.shadow.camera.near=0.5;dirLight.shadow.camera.far=10;
dirLight.shadow.camera.left=-4;dirLight.shadow.camera.right=4;
dirLight.shadow.camera.top=4;dirLight.shadow.camera.bottom=-4;
scene.add(dirLight);

// Under-cabinet LED lights
function ledLight(x,y,z){
  const l=new THREE.PointLight(0xFFE8C0,0.3,1.5);
  l.position.set(x,y,z);scene.add(l);
}
// Back wall under-cabinet
for(let x=0.3;x<BW;x+=0.5)ledLight(x,WC_BTM-0.05,-0.1);
// Left wall under-cabinet
for(let z=-0.3;z>-LW;z-=0.5)ledLight(0.1,WC_BTM-0.05,z);

// Ceiling recessed lights
for(let x=0.5;x<3;x+=1)for(let z=-0.5;z>-2.5;z-=1){
  const cl=new THREE.PointLight(0xFFF5E0,0.15,3);
  cl.position.set(x,CEIL-0.02,z);scene.add(cl);
}

// ===== ZONE LABELS (CSS2D) =====
const zoneGroup=new THREE.Group();
scene.add(zoneGroup);
function zoneLabel(text,x,y,z){
  const div=document.createElement('div');
  div.style.cssText='background:rgba(196,147,90,0.85);color:#fff;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none';
  div.textContent=text;
  const label=new CSS2DObject(div);
  label.position.set(x,y,z);
  zoneGroup.add(label);
}
zoneLabel('🔥 烹饪区',0.3,CEIL-0.3,-0.3);
zoneLabel('🔪 切菜区',1.0,CEIL-0.3,-0.3);
zoneLabel('🥬 洗菜区',winX,CEIL-0.3,-0.3);
zoneLabel('🍽️ 装盘区',islandX+islandW/2,COUNTER_H+0.4,islandZ-islandD/2);
zoneLabel('📦 储物区',0.3,CEIL-0.3,-LW/2);
zoneGroup.visible=false;

// ===== WORKFLOW ARROWS =====
const arrowGroup=new THREE.Group();
scene.add(arrowGroup);
const flowPts=[
  [fridgeX+0.4,0.02,fridgeZ],      // fridge
  [winX,0.02,-CD-0.3],              // sink
  [1.0,0.02,-CD-0.3],               // prep
  [0.3,0.02,-CD-0.3],               // cooktop
  [islandX+islandW/2,0.02,islandZ], // island
  [tableX,0.02,tableZ],             // table
];
for(let i=0;i<flowPts.length-1;i++){
  const a=new THREE.Vector3(...flowPts[i]);
  const b=new THREE.Vector3(...flowPts[i+1]);
  const dir=b.clone().sub(a);
  const len=dir.length();
  const arrow=box(0.06,0.005,len,mat.arrow,0,0,0);
  arrow.position.copy(a.clone().add(b).multiplyScalar(0.5));
  arrow.lookAt(b);
  arrowGroup.add(arrow);
  // Arrowhead
  const cone=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.12,8),mat.arrow);
  cone.position.copy(b);
  cone.lookAt(a);
  cone.rotateX(Math.PI/2);
  arrowGroup.add(cone);
}
// Flow labels
const flowLabels=['冰箱','水槽','切菜','灶台','中岛','餐桌'];
flowPts.forEach((p,i)=>{
  const div=document.createElement('div');
  div.style.cssText='background:rgba(212,165,106,0.8);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;pointer-events:none';
  div.textContent=flowLabels[i];
  const label=new CSS2DObject(div);
  label.position.set(p[0],0.15,p[2]);
  arrowGroup.add(label);
});
arrowGroup.visible=false;

// ===== STORAGE LABELS (CSS2D) =====
const storageGroup=new THREE.Group();
scene.add(storageGroup);
function storageLabel(text,x,y,z){
  const div=document.createElement('div');
  div.style.cssText='background:rgba(40,35,30,0.8);color:#D4A56A;padding:2px 6px;border-radius:4px;font-size:10px;pointer-events:none;white-space:nowrap';
  div.textContent=text;
  const label=new CSS2DObject(div);
  label.position.set(x,y,z);
  storageGroup.add(label);
}
// Back wall bottom
storageLabel('烤箱/蒸箱',0.3,KB+CH/2,-CD-0.1);
storageLabel('垃圾桶+清洁',0.8,KB+CH/2,-CD-0.1);
storageLabel('刀具+锅具',1.2,KB+CH/2,-CD-0.1);
storageLabel('刀具+厨具',1.6,KB+CH/2,-CD-0.1);
storageLabel('洗碗机+管线机',atX+0.3,KB+CH/2,-CD-0.1);
// Back wall top
storageLabel('调料+锅具',0.3,wcY+wcH/2,-0.4);
storageLabel('碗碟+杯子',1.0,wcY+wcH/2,-0.4);
storageLabel('保鲜膜/袋',atX+0.3,wcY+wcH/2,-0.4);
// Left wall
storageLabel('米面粮油',CD+0.15,KB+CH/2,-0.2);
storageLabel('干货调味',CD+0.15,KB+CH/2,-0.62);
storageLabel('备用厨具',CD+0.15,KB+CH/2,-1.05);
storageLabel('一次性用品',CD+0.15,KB+CH/2,-1.45);
// Island
storageLabel('碗碟+餐具',islandX+islandW/2,KB+CH/2,islandZ+0.15);
storageGroup.visible=false;

// ===== CONTROLS =====
let showZones=false,showFlow=false,showStorage=false;
const btnZ=document.getElementById('btnZones');
const btnF=document.getElementById('btnFlow');
const btnS=document.getElementById('btnStorage');
const btnR=document.getElementById('btnReset');

btnZ.onclick=()=>{showZones=!showZones;zoneGroup.visible=showZones;btnZ.classList.toggle('active')};
btnF.onclick=()=>{showFlow=!showFlow;arrowGroup.visible=showFlow;btnF.classList.toggle('active')};
btnS.onclick=()=>{showStorage=!showStorage;storageGroup.visible=showStorage;btnS.classList.toggle('active')};
btnR.onclick=()=>{camera.position.copy(defCamPos);controls.target.copy(defCamTarget);controls.update()};

// ===== CLICK INTERACTION =====
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const popup=document.getElementById('popup');

renderer.domElement.addEventListener('click',(e)=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickables);
  if(hits.length>0){
    const d=hits[0].object.userData;
    document.getElementById('popupTitle').textContent=d.title;
    document.getElementById('popupBody').textContent=d.body;
    popup.style.display='block';
    popup.style.left=Math.min(e.clientX+10,innerWidth-340)+'px';
    popup.style.top=Math.min(e.clientY+10,innerHeight-200)+'px';
  }else{popup.style.display='none'}
});

// ===== RESIZE =====
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  labelRenderer.setSize(innerWidth,innerHeight);
});

// ===== ANIMATE =====
document.getElementById('loading').style.display='none';
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
